mutation updateProfile(
	$profile: UpdateProfileInput
	$measurements: UpdateBodyMeasurementsInput
) {
	updateProfile(profile: $profile, measurements: $measurements) {
		id
		email
		profile {
			id
			fullName
			avatarUrl
			socials
			gender
			age
			bio
			activityLevel
			nutritionalGoal
			
			bodyMeasurements {
				height
				weight
				goalWeight
				waistCircumference
				chestMeasurement
				armCircumference
				thighCircumference
			}
		}
	}
}
