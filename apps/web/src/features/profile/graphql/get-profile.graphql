query getProfile {
	me {
		id
		email
		isEmailVerified
		profile {
			id
			fullName
			avatarUrl
			socials
			gender
			age
			bio
			activityLevel
			nutritionalGoal

			bodyMeasurements {
				height
				weight
				goalWeight
				waistCircumference
				chestMeasurement
				armCircumference
				thighCircumference
			}
		}
	}
}
